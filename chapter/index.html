<!DOCTYPE html>
<html lang="in">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Daftar Chapter</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
:root{
    --bg:#080f17;
    --card:#1b1e2d;
    --text:#f1f1f1;
    --dim:#9ca3af;
    --accent:#9c6cff;
    --border:rgba(255,255,255,.08);
    --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

@font-face  {
    font-family: 'ComicReliefBold';
    src: url('fonts/ComicRelief-Bold.ttf') format('truetype');
    font-weight: bold;
    font-style: normal;
}

body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background-color: var(--bg);
    color: var(--text);
    margin: 0 auto;
    max-width: 500px;
    min-height: 100dvh;
    padding-bottom: 50px;
}

body::before{
    content:"";
    position:fixed;
    top:-120px;
    left:50%;
    transform:translateX(-50%);
    width:320px;
    height:320px;
    background:
    radial-gradient(
        circle,
        rgba(156,108,255,.12),
        transparent 70%
    );
    pointer-events:none;
    z-index:-1;
}

.header {
    position: sticky;
    top: 0;
    z-index: 1000;
    background:
    linear-gradient(
        to right,
        rgba(156,108,255,.10),
        rgba(8,15,23,.92) 30%
    );  
    backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(156,108,255,.08);
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px;
}

.back-btn {
    width: 40px;
    height: 40px;
    background: none;
    color: white;
    border: none;
    font-size: 20px;
}

.header-title h2 {
    font-family: 'ComicReliefBold', sans-serif;
    font-size: 18px;
    line-height: 1.3;
}

.header-title p {
    font-size: 14px;
    color: var(--dim);
    margin-top: 2px;
}

.volume-hero{
    rotate: -4deg;
    transition: .35s;
}

.volume-hero:hover{
    rotate: 0deg;
    scale: 1.03;
}

.volume-hero:active{
    scale: .98;
    rotate: -2deg;
}

.volume-hero {
    position: relative;
    border-radius: 20px;    
    border:1px solid rgba(255,255,255,.08);
    width: 300px;
    height: 420px;
    background-size: cover;
    background-position: center;
    left: 50%;
    transform: translateX(-50%);
    margin: 20px 0 40px;
    overflow: hidden;
    filter: brightness(1.12) contrast(1.03);
    box-shadow:
    0 10px 30px rgba(0,0,0,.35),
    0 0 40px rgba(156,108,255,.18),
    0 0 90px rgba(156,108,255,.08);
    isolation: isolate;
}

.volume-hero::before{
    content:"";
    position:absolute;
    inset:0;
    background:
    linear-gradient(
        to top,
        rgba(0,0,0,.45),
        rgba(0,0,0,.1));
    z-index:1;
}

.volume-hero::after{
    content:"";
    position:absolute;
    inset:0;
    background:
    linear-gradient(
        135deg,
        rgba(255,255,255,.18),
        transparent 30%
    );
    z-index:2;
    pointer-events:none;
}

.volume-info{
    display:grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap:12px;
    padding:0 20px;
    margin-top:-5px;
    margin-bottom:20px;
}

.info-box{
    background: rgba(27, 30, 45, 0.4);
    border:
    1px solid rgba(255,255,255,.05);
    border-radius:16px;
    padding: 14px 20px;
    backdrop-filter: blur(10px);
    transition:.25s;
    display: flex;
    align-items: center;
    gap: 18px;
}

.info-box i {
    font-size: 20px;
    color: var(--accent);
}

.fa-spinner{
    animation: spin 3s linear infinite;
}

@keyframes spin{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}

.info-box:hover{
    transform:translateY(-2px);
    border-color:
    rgba(156,108,255,.18);
    background:
    rgba(156,108,255,.04);
}

.info-box span{
    display:block;
    font-size: 14px;
    color:var(--dim);
    margin-top:3px;
    text-transform:uppercase;
    letter-spacing:.5px;
    font-weight: 500;
}

.info-box strong{
    font-family: 'ComicReliefBold', sans-serif;
    font-size: 16px;
    color:var(--text);
    font-weight:700;
}

.divider {
    height: 1px;
    background:
    linear-gradient(
        to right,
        transparent,
        rgba(156,108,255,.25),
        transparent
    );
    margin: 20px;
}

.Chapter-title {
    padding: 0 20px;
}

.Chapter-title h3 {
    color: var(--dim);
    font-weight: 700;
    font-size: 1rem;
}

.chapter-container {
    display: grid;
    padding: 20px;
    gap: 14px;
}

.chapter-data {
    padding: 0 10px;
    flex: 1;
    min-width: 0;
}

.chapterList{
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap:15px;
    padding:18px;
    border-radius:16px;
    background:
linear-gradient(
    145deg,
    rgba(36,40,60,.55),
    rgba(27,30,45,.35)
);
    border:1px solid rgba(255,255,255,.05);
    border-left: 5px solid var(--accent);
    text-decoration:none;
    color:var(--text);
    transition:.25s;
}

.chapterList:hover{
    background: rgba(156, 108, 255, 0.06);
    transform:translateY(-2px);
}

.chapterList:active{
    transform:scale(.98);
}

.chapterList{
    animation: fadeUp .4s ease;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.chapter-number {
     font-family: 'ComicReliefBold', sans-serif;
     font-weight: 700;
     color: var(--accent);
     margin-bottom: 0.2rem;     
     font-size: 1.1rem;
     display: flex;
     align-items: center;
     gap: 0.5rem;
     text-shadow: 0 0 12px rgba(156,108,255,.35);
}

.chapter-number::before {
     content: "";
     display: inline-block;
     width: 8px;
     height: 8px;
     background: var(--accent);
     border-radius: 50%;
}

.chapter-info h3 {
    line-height: 1.5; 
    font-weight: bold;
    font-size: 1rem;
    overflow:hidden;
    text-overflow:ellipsis;
}

.chapter-arrow{
    opacity:.4;
    color:white;
    font-size:.9rem;
}

html{
    scroll-behavior:smooth;
}

img{
    user-select:none;
    -webkit-user-drag:none;
}
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="history.back()">
            <i class="fas fa-arrow-left"></i>
        </button>
        
        <div class="header-title">
            <h2 id="volTitle">
                Loading...
            </h2>
            
            <p id="seriesTitle">
                Please Wait
            </p>
        </div>
    </div>
    
    <div class="content">
        <div class="volume-hero" id="hero">
    </div>
    
    <div id="chapterDetail"></div>
    
    <div class="divider"></div>
    
    <div class="Chapter-title">
        <h3>DAFTAR CHAPTER</h3>
    </div>
    
    <div class="chapter-container" id="chapterList"></div>
        
    </div>
    <script>
const params = new URLSearchParams(location.search);

const seriesKey = params.get("series");
const volumeKey = params.get("volume");
const API_BASE = "http://127.0.0.1:3000";  


async function loadChapterPage(){

  try{

    const res =
    await fetch(`${API_BASE}/api/novels/${seriesKey}`);

    const data = await res.json();

    const volume = data.volumes.find(v => {

  // cocok berdasarkan id
  if (v.id == volumeKey) return true;

  // cocok berdasarkan volNum
  if (
    String(v.volNum)
    .toLowerCase()
    .replace(/\s+/g, "-")
    ==
    String(volumeKey)
    .toLowerCase()
    .replace(/\s+/g, "-")
  ) return true;

  return false;
});

// STATUS ICON
let statusIcon = "fas fa-spinner";

switch(volume.status.toLowerCase()){

  case "completed":
    statusIcon = "fas fa-check-circle";
    break;

  case "upcoming":
    statusIcon = "fas fa-hourglass-start";
    break;

  case "hiatus":
    statusIcon = "fas fa-clock";
    break;

  case "ongoing":
  default:
    statusIcon = "fas fa-spinner";
    break;
}

    if(!volume){
      document.getElementById("chapterList")
      .innerHTML =
      `<div class="loading">
        Volume tidak ditemukan.
      </div>`;
      return;
    }

    // HEADER
    document.getElementById("volTitle")
    .textContent =
    `Volume ${volume.volNum}`;

    document.getElementById("seriesTitle")
    .textContent =
    `${volume.title}`;

    // HERO
    document.getElementById("hero")
    .style.backgroundImage =
    `url('${volume.image}')`;
    
    // DETAIL
    document.getElementById("chapterDetail")
.innerHTML = `

<div class="volume-info">

    <div class="info-box">
            <i class="${statusIcon}"></i>
        <div class="info">
            <strong>
${volume.status.charAt(0).toUpperCase() + volume.status.slice(1)}
</strong>
            <span>Status</span>
        </div>
    </div>

    <div class="info-box">
            <i class="fas fa-file-alt"></i>
        <div class="info">
            <strong>${volume.chapterCount}</strong>
            <span>Chapter</span>
        </div>
    </div>

</div>

`;

    // CHAPTER
    const chapterHTML =
volume.chapters_data.map(ch => `

<a
href="../reader/?series=${seriesKey}&volume=${volume.id}&chapter=${ch.id}"
class="chapterList">
    <div class="chapter-data">
        <div class="chapter-number">
            ${ch.number}
        </div>

        <div class="chapter-info">
            <h3>${ch.title}</h3>
        </div>
    </div>

    <i class="fas fa-chevron-right chapter-arrow"></i>

</a>

`).join("");

    document.getElementById("chapterList")
    .innerHTML =
    chapterHTML;

  }catch(err){

    document.getElementById("chapterList")
    .innerHTML =
    `<div class="loading">
      Gagal memuat chapter.
    </div>`;

    console.error(err);
  }

}

loadChapterPage();
    </script>
</body>
</html>
