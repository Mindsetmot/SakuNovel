<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Saku Novel</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=feedback" />
  <link rel="stylesheet" href="line-awesome/css/line-awesome.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Ancizar+Serif:ital,wght@0,300..900;1,300..900&family=Archivo+Black&family=Creepster&family=Lobster&family=Roboto:ital,wght@0,100..900;1,100..900&family=Special+Gothic+Expanded+One&family=Zen+Tokyo+Zoo&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="icon" href="image/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <header class="fixed-header">
            <button id="back-button">
                <i class="fas fa-arrow-left"></i>
            </button>
            <button id="search-button" onclick="bukaSearch()">
  <i class="fas fa-search"></i>
</button>
            <h1 class="logo">Saku<span>Novel</span></h1>
            
            <div class="right-icon">
            <button id="notification" class="notification-btn">
  <i class="fas fa-bell"></i>
  <span class="badge" id="notifBadge"></span>
</button>
            </button>
        </div>
        </header>
        
        <main>
            <section id="beranda" class="page active">
                <div class="stats-section">
                    <a href="#" class="stat-card">
                        <i class="fas fa-bookmark"></i>
                        <span>Bookmark</span>
                    </a>

                    <a href="#" class="stat-card">
                        <i class="fas fa-hourglass-start"></i>
                        <span>Upcoming</span>
                    </a>

                    <a href="#" class="stat-card">
                        <i class="fas fa-spinner"></i>
                        <span>Ongoing</span>
                    </a>

                    <a href="#" class="stat-card">
                        <i class="fas fa-clock"></i>
                        <span>Hiatus</span>
                    </a>
                
                    <a href="#" class="stat-card">
                        <i class="fas fa-check-circle"></i>
                        <span>Completed</span>
                    </a>
                </div>
                
                <div class="slide-card" id="slideCard"></div>
        
        <div class="grid-header">
            <h3>Just for you</h3>
        </div>
        
        <div class="grid-container" id="gridContainer">
            
        </div>                    
                
            </section>
            
            <section id="genre" class="page">
                <div class="filter-container" id="filterBar">
            <div class="chip active" onclick="filter('All', this)">Semua</div>
            </div>
                    <div class="ln-grid" id="mainGrid"></div>
                </div>
            </section>
            
            <section id="notification-page" class="page">
                  <div id="notifList"></div>

<div id="notifModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <div id="mIcon" class="modal-icon-small"></div>
      <h2 id="mTitle"></h2>
    </div>
    <div class="modal-body">
      <p id="mText"></p>
    </div>
    <button class="btn-close" onclick="closeNotifModal()">Oke</button>
  </div>
</div>
            </section>

        </main>
        
        <nav class="bottom-nav">
            <a href="#" data-target="beranda" class="active"> <i class="fas fa-home"></i><span>Beranda</span></a>
            <a href="#" data-target="genre"> <i class="fas fa-layer-group"></i><span>Genre</span></a>
        </nav>
        
        <script src="js/script.js"></script>
    </body>
</html>
